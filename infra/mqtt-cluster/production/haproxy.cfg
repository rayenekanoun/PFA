global
  log stdout format raw local0
  maxconn 50000

defaults
  mode tcp
  log global
  timeout connect 5s
  timeout client 2m
  timeout server 2m
  option tcplog

frontend mqtt_in
  bind *:1883
  default_backend emqx_backends

backend emqx_backends
  balance source
  option tcp-check
  server broker1 broker-1.your-domain.com:1883 check inter 3s fall 3 rise 2
  server broker2 broker-2.your-domain.com:1883 check inter 3s fall 3 rise 2
  server broker3 broker-3.your-domain.com:1883 check inter 3s fall 3 rise 2

frontend stats
  bind *:8404
  mode http
  stats enable
  stats uri /stats
  stats refresh 5s
