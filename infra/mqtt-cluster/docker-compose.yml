name: mqtt-cluster

x-emqx-common-env: &emqx-common-env
  EMQX_NODE__COOKIE: ${EMQX_NODE_COOKIE:-emqx_cluster_cookie}
  EMQX_CLUSTER__DISCOVERY_STRATEGY: static
  EMQX_CLUSTER__STATIC__SEEDS: "[emqx@emqx1.mqtt.local,emqx@emqx2.mqtt.local,emqx@emqx3.mqtt.local]"
  EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_DASHBOARD_USER:-admin}
  EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_DASHBOARD_PASS:-public}
  EMQX_LOG__CONSOLE_HANDLER__LEVEL: info

services:
  emqx1:
    image: emqx/emqx:5.8.7
    container_name: emqx1
    hostname: emqx1.mqtt.local
    restart: unless-stopped
    environment:
      <<: *emqx-common-env
      EMQX_NODE__NAME: emqx@emqx1.mqtt.local
    ports:
      - "${EMQX1_MQTT_PORT:-1883}:1883"
      - "${EMQX1_DASHBOARD_PORT:-18083}:18083"
    volumes:
      - emqx1-data:/opt/emqx/data
      - emqx1-log:/opt/emqx/log
    networks:
      mqtt-net:
        aliases:
          - emqx1.mqtt.local

  emqx2:
    image: emqx/emqx:5.8.7
    container_name: emqx2
    hostname: emqx2.mqtt.local
    restart: unless-stopped
    environment:
      <<: *emqx-common-env
      EMQX_NODE__NAME: emqx@emqx2.mqtt.local
    ports:
      - "${EMQX2_MQTT_PORT:-2883}:1883"
    volumes:
      - emqx2-data:/opt/emqx/data
      - emqx2-log:/opt/emqx/log
    networks:
      mqtt-net:
        aliases:
          - emqx2.mqtt.local

  emqx3:
    image: emqx/emqx:5.8.7
    container_name: emqx3
    hostname: emqx3.mqtt.local
    restart: unless-stopped
    environment:
      <<: *emqx-common-env
      EMQX_NODE__NAME: emqx@emqx3.mqtt.local
    ports:
      - "${EMQX3_MQTT_PORT:-3883}:1883"
    volumes:
      - emqx3-data:/opt/emqx/data
      - emqx3-log:/opt/emqx/log
    networks:
      mqtt-net:
        aliases:
          - emqx3.mqtt.local

  mqtt-tools:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-tools
    command: ["sh", "-c", "sleep infinity"]
    restart: unless-stopped
    depends_on:
      - emqx1
      - emqx2
      - emqx3
    networks:
      - mqtt-net

  simulator:
    build:
      context: ./simulator
    container_name: mqtt-simulator
    restart: unless-stopped
    environment:
      MQTT_SERVERS: "emqx1:1883,emqx2:1883,emqx3:1883"
      REQUEST_TOPIC: "devices/+/commands/#"
      REQUEST_QOS: "2"
      RESPONSE_QOS: "2"
      MAX_DELAY_MS: "30000"
      DUPLICATE_TTL_MS: "300000"
      MQTT_RECONNECT_PERIOD_MS: "1000"
      MQTT_CONNECT_TIMEOUT_MS: "10000"
      MQTT_CLIENT_ID: "diag-simulator"
    depends_on:
      - emqx1
      - emqx2
      - emqx3
    networks:
      - mqtt-net

networks:
  mqtt-net:
    name: mqtt-net
    driver: bridge

volumes:
  emqx1-data:
  emqx1-log:
  emqx2-data:
  emqx2-log:
  emqx3-data:
  emqx3-log:
